<section class="pi">

  <div class="pi-badges">
    <span class="pi-badge maes">❤️ OFERTA ANTECIPADA DIA DAS MÃES</span>
    <span class="pi-badge promo" id="promoDate">🔥 PROMO 25.04</span>

    </button>
  </div>

  <div class="pi-stats">
    <span class="pi-rating">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      4.9

    <span class="pi-sold">• 12.4K vendidos</span>

  <div class="pi-stock">
    <span class="pi-stock-dot"></span>

      <div class="pi-ship-fee">Taxa de envio: <span style="text-decoration: line-through;">R$ 14,60</span></div>

    <button class="ph-btn" aria-label="Detalhes de entrega">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
